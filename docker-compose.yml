version: '3.8'

services:
  app1:
    build: ./app1
    container_name: app1
    networks:
      - my-network
  
  app2:
    build: ./app2
    container_name: app2
    networks:
      - my-network
  
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
    networks:
      - my-network

networks:
  my-network: